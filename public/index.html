<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>1688 Data Lake — Browser</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 0; background: #f5f5f7; color: #1d1d1f; }
  header { background: #1d1d1f; color: white; padding: 16px 24px; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header p { margin: 4px 0 0; font-size: 13px; opacity: 0.7; }
  .stats { display: flex; gap: 16px; padding: 12px 24px; background: white; border-bottom: 1px solid #d2d2d7; font-size: 13px; }
  .stat { display: flex; flex-direction: column; }
  .stat .label { color: #6e6e73; font-size: 11px; text-transform: uppercase; }
  .stat .value { font-weight: 600; font-size: 16px; }
  .filters { display: flex; gap: 12px; padding: 12px 24px; background: white; border-bottom: 1px solid #d2d2d7; align-items: center; flex-wrap: wrap; }
  .filters input, .filters select { padding: 6px 10px; border: 1px solid #d2d2d7; border-radius: 6px; font-size: 13px; }
  .filters input { min-width: 240px; }
  .filters label { font-size: 12px; color: #6e6e73; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: white; }
  th { background: #f5f5f7; padding: 10px 12px; text-align: left; font-weight: 600; color: #1d1d1f; border-bottom: 1px solid #d2d2d7; cursor: pointer; user-select: none; position: sticky; top: 0; }
  th:hover { background: #e8e8ed; }
  th.sorted-asc::after { content: ' ▲'; color: #0071e3; }
  th.sorted-desc::after { content: ' ▼'; color: #0071e3; }
  td { padding: 8px 12px; border-bottom: 1px solid #e8e8ed; vertical-align: top; }
  tr:hover td { background: #f5f5f7; }
  .matched-yes { color: #30d158; font-weight: 600; }
  .matched-no { color: #ff3b30; }
  .n1-tag { display: inline-block; padding: 2px 6px; background: #e3f2fd; color: #0d47a1; border-radius: 3px; font-size: 11px; }
  .n4-tag { display: inline-block; padding: 2px 6px; background: #fff3e0; color: #e65100; border-radius: 3px; font-size: 11px; }
  .price { text-align: right; font-variant-numeric: tabular-nums; }
  .score { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .pagination { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 16px; font-size: 13px; }
  .pagination button { padding: 6px 12px; border: 1px solid #d2d2d7; border-radius: 6px; background: white; cursor: pointer; }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination button:not(:disabled):hover { background: #f5f5f7; }
  .title-cell { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .title-cell:hover { white-space: normal; overflow: visible; }
  .empty { padding: 40px; text-align: center; color: #6e6e73; }
  a { color: #0071e3; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .img-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; cursor: pointer; background: #f5f5f7; }
  .img-thumb:hover { transform: scale(1.05); }
  .img-placeholder { width: 50px; height: 50px; background: #f5f5f7; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #c7c7cc; font-size: 10px; }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; cursor: zoom-out; }
  .modal.show { display: flex; }
  .modal img { max-width: 90%; max-height: 90%; object-fit: contain; }
  .modal .close { position: absolute; top: 20px; right: 30px; color: white; font-size: 30px; cursor: pointer; }

</style>
</head>
<body>

<header>
  <h1>1688 Data Lake — Browser</h1>
  <p>294 silver offers · 273 Rakumart matched (92.9%) · 9 N1 taxonomy · v2 closed 2026-06-23</p>
</header>

<div class="stats">
  <div class="stat"><span class="label">Total</span><span class="value" id="stat-total">—</span></div>
  <div class="stat"><span class="label">Matched</span><span class="value" id="stat-matched">—</span></div>
  <div class="stat"><span class="label">Match rate</span><span class="value" id="stat-rate">—</span></div>
  <div class="stat"><span class="label">Showing</span><span class="value" id="stat-showing">—</span></div>
</div>

<div class="filters">
  <input type="search" id="q" placeholder="Search CN/PT title..." />
  <label>N1:
    <select id="n1-filter"><option value="">all</option></select>
  </label>
  <label>N2:
    <select id="n2-filter"><option value="">all</option></select>
  </label>
  <label>N3:
    <select id="n3-filter"><option value="">all</option></select>
  </label>
  <label>Category:
    <select id="cat-filter"><option value="">all</option></select>
  </label>
  <label>Match:
    <select id="match-filter">
      <option value="">all</option>
      <option value="true">matched only</option>
      <option value="false">unmatched only</option>
    </select>
  </label>
  <label>Min score:
    <input type="number" id="min-score" min="0" max="100" placeholder="0" style="min-width: 60px;" />
  </label>
</div>

<table id="table">
  <thead>
    <tr>
      <th data-sort="offer_id">ID</th>
      <th>Img</th>
      <th data-sort="category">Cat</th>
      <th data-sort="n1">N1</th>
      <th data-sort="n2">N2</th>
      <th data-sort="n3">N3</th>
      <th data-sort="n4">N4</th>
      <th data-sort="title_cn">Title (CN)</th>
      <th data-sort="title_br">Title (PT-BR)</th>
      <th data-sort="price_cny" class="price">¥ CNY</th>
      <th data-sort="price_brl" class="price">R$ BRL</th>
      <th data-sort="match_score" class="score">Score</th>
      <th data-sort="matched">✓</th>
      <th data-sort="supplier">Supplier</th>
    </tr>
  </thead>
  <tbody id="tbody">
    <tr><td colspan="14" class="empty">Loading...</td></tr>
  </tbody>
</table>

<div class="pagination">
  <button id="prev">← Prev</button>
  <span id="page-info">Page 1</span>
  <button id="next">Next →</button>
</div>

<script>
const API = '';

// State
let offers = [];           // current page rows
let total = 0;
let matched = 0;
let page = 1;
const limit = 50;
let sortKey = 'offer_id';
let sortDir = 'asc';
let filters = { q: '', n1: '', n2: '', n3: '', category: '', has_match: '', min_score: '' };

// ── Load taxonomy into N1/N2/N3 dropdowns ──
fetch(`${API}/api/categories`).then(r => r.json()).then(cat => {
  const sel1 = document.getElementById('n1-filter');
  Object.keys(cat).filter(k => !k.startsWith('_')).forEach(n1 => {
    const opt = document.createElement('option');
    opt.value = n1; opt.textContent = n1;
    sel1.appendChild(opt);
  });
  // Build N2/N3 sets from taxonomy tree
  const n2set = new Set(), n3set = new Set();
  Object.values(cat).filter(v => typeof v === 'object' && !v._meta).forEach(n1obj => {
    if (n1obj.n2) Object.keys(n1obj.n2).filter(k => k !== '_meta').forEach(n2 => {
      n2set.add(n2);
      const n2obj = n1obj.n2[n2];
      if (n2obj.n3) Object.keys(n2obj.n3).filter(k => k !== '_meta').forEach(n3 => n3set.add(n3));
    });
  });
  const sel2 = document.getElementById('n2-filter');
  [...n2set].sort().forEach(n2 => {
    const opt = document.createElement('option'); opt.value = n2; opt.textContent = n2; sel2.appendChild(opt);
  });
  const sel3 = document.getElementById('n3-filter');
  [...n3set].sort().forEach(n3 => {
    const opt = document.createElement('option'); opt.value = n3; opt.textContent = n3; sel3.appendChild(opt);
  });
});

// ── Load categories from stats ──
fetch(`${API}/api/stats/match-rate`).then(r => r.json()).then(d => {
  const sel = document.getElementById('cat-filter');
  d.categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.category; opt.textContent = `${c.category} (${c.offers})`;
    sel.appendChild(opt);
  });
  // Total stats
  document.getElementById('stat-matched').textContent = d.categories.reduce((s, c) => s + c.matched, 0);
  const total_offers = d.categories.reduce((s, c) => s + c.offers, 0);
  const total_matched = d.categories.reduce((s, c) => s + c.matched, 0);
  document.getElementById('stat-total').textContent = total_offers;
  document.getElementById('stat-rate').textContent = (total_matched / total_offers * 100).toFixed(1) + '%';
});

// ── Load offers (paginated + filtered) ──
function loadOffers() {
  const params = new URLSearchParams();
  params.set('page', page);
  params.set('limit', limit);
  // Only include non-empty filters (FastAPI rejects empty strings)
  if (filters.n1) params.set('n1', filters.n1);
  if (filters.n2) params.set('n2', filters.n2);
  if (filters.n3) params.set('n3', filters.n3);
  if (filters.category) params.set('category', filters.category);
  if (filters.has_match !== '') params.set('has_match', filters.has_match);
  if (filters.min_score) params.set('min_score', filters.min_score);
  let url = `${API}/api/offers?${params}`;
  if (filters.q) {
    // Use search endpoint for full-text
    url = `${API}/api/search?q=${encodeURIComponent(filters.q)}&limit=${limit}`;
  }

  fetch(url).then(r => r.json()).then(d => {
    if (filters.q) {
      // search returns different shape
      offers = d.matches;
      total = d.total;
      // Mark price_cny as numeric
      offers.forEach(o => {
        o.image_url = '';  // search doesn't return images
        o.price_cny_num = parseFloat(o.price_cny) || 0;
        o.price_brl_num = parseFloat(o.price_brl) || 0;
        o.match_score_num = parseFloat(o.match_score) || 0;
      });
    } else {
      // /offers endpoint
      offers = d.offers.map(o => ({
        offer_id: o.offer_id,
        image_url: ((o.mtop || {}).image_url) || '',
        category: o.category,
        n1: (o.taxonomy || {}).n1,
        n2: (o.taxonomy || {}).n2,
        n3: (o.taxonomy || {}).n3,
        n4: (o.taxonomy || {}).n4,
        title_cn: ((o.mtop || {}).title) || '',
        title_br: ((o.rakumart || {}).title_br) || '',
        price_cny: (o.mtop || {}).price_cny,
        price_brl: (o.rakumart || {}).price_brl,
        match_score: (o.rakumart || {}).match_score,
        matched: !!o.rakumart,
        supplier: ((o.su_detail || {}).shop_name) || '',
        price_cny_num: parseFloat((o.mtop || {}).price_cny) || 0,
        price_brl_num: parseFloat((o.rakumart || {}).price_brl) || 0,
        match_score_num: parseFloat((o.rakumart || {}).match_score) || 0,
        rakumart_url: ((o.rakumart || {}).url) || '',
      }));
      total = d.total;
    }
    matched = offers.filter(o => o.matched).length;
    document.getElementById('stat-showing').textContent = `${offers.length} of ${total}`;
    document.getElementById('page-info').textContent = `Page ${page}`;
    document.getElementById('prev').disabled = page <= 1;
    document.getElementById('next').disabled = offers.length < limit;
    render();
  });
}

// ── Sort + render ──
function render() {
  // Sort
  const k = sortKey;
  const dir = sortDir === 'asc' ? 1 : -1;
  offers.sort((a, b) => {
    let av = a[k], bv = b[k];
    // Use numeric variants
    if (k === 'price_cny') { av = a.price_cny_num; bv = b.price_cny_num; }
    if (k === 'price_brl') { av = a.price_brl_num; bv = b.price_brl_num; }
    if (k === 'match_score') { av = a.match_score_num; bv = b.match_score_num; }
    if (av === bv) return 0;
    if (av === undefined || av === null || av === '') return 1;
    if (bv === undefined || bv === null || bv === '') return -1;
    if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dir;
    return String(av).localeCompare(String(bv)) * dir;
  });

  // Header sort indicators
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.sort === sortKey) {
      th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    }
  });

  // Body
  const tbody = document.getElementById('tbody');
  if (offers.length === 0) {
    tbody.innerHTML = '<tr><td colspan="14" class="empty">No offers match the filters.</td></tr>';
    return;
  }
  tbody.innerHTML = offers.map(o => {
    const scoreNum = o.match_score_num || 0;
    const scoreStr = scoreNum ? scoreNum.toFixed(1) : '—';
    const priceCnyStr = o.price_cny_num ? o.price_cny_num.toFixed(2) : '—';
    const priceBrlStr = o.price_brl_num ? 'R$ ' + o.price_brl_num.toFixed(2) : '—';
    const matchedCell = o.matched ? `<span class="matched-yes">✓</span>` : `<span class="matched-no">✗</span>`;
    return `
      <tr>
        <td><a href="/api/offers/${o.offer_id}" target="_blank">${o.offer_id}</a></td>
        <td>${o.image_url ? `<img class="img-thumb" src="/api/image/${o.offer_id}" loading="lazy" data-full="/api/image/${o.offer_id}" onerror="this.outerHTML='<div class=\'img-placeholder\'>no img</div>'" onclick="showImage('/api/image/${o.offer_id}')" />` : '<div class="img-placeholder">—</div>'}</td>
        <td>${o.category || '—'}</td>
        <td><span class="n1-tag">${o.n1 || '—'}</span></td>
        <td>${o.n2 || '—'}</td>
        <td>${o.n3 || '—'}</td>
        <td><span class="n4-tag">${o.n4 || '—'}</span></td>
        <td class="title-cell" title="${(o.title_cn || '').replace(/"/g, '&quot;')}">${o.title_cn || '—'}</td>
        <td class="title-cell" title="${(o.title_br || '').replace(/"/g, '&quot;')}">${o.title_br || '—'}</td>
        <td class="price">${priceCnyStr}</td>
        <td class="price">${priceBrlStr}</td>
        <td class="score">${scoreStr}</td>
        <td>${matchedCell}</td>
        <td>${o.supplier || '—'}</td>
      </tr>`;
  }).join('');
}

// ── Event listeners ──
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (sortKey === k) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortKey = k;
      sortDir = 'asc';
    }
    render();
  });
});

document.getElementById('prev').addEventListener('click', () => { if (page > 1) { page--; loadOffers(); } });
document.getElementById('next').addEventListener('click', () => { page++; loadOffers(); });

['q', 'n1-filter', 'n2-filter', 'n3-filter', 'cat-filter', 'match-filter', 'min-score'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    page = 1;
    filters.q = document.getElementById('q').value;
    filters.n1 = document.getElementById('n1-filter').value;
    filters.n2 = document.getElementById('n2-filter').value;
    filters.n3 = document.getElementById('n3-filter').value;
    filters.category = document.getElementById('cat-filter').value;
    filters.has_match = document.getElementById('match-filter').value;
    filters.min_score = document.getElementById('min-score').value;
    loadOffers();
  });
});

// Initial load
loadOffers();
</script>


<div id="imageModal" class="modal" onclick="closeImage()">
  <span class="close">&times;</span>
  <img id="modalImg" src="" alt="" />
</div>

<script>
function showImage(url) {
  const modal = document.getElementById('imageModal');
  document.getElementById('modalImg').src = url;
  modal.classList.add('show');
}
function closeImage() {
  document.getElementById('imageModal').classList.remove('show');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeImage(); });
</script>
</body>
</html>
